version: "3"

tasks:
  default:
    cmds:
      - task: format
      - task: lint
      - task: test
      - task: build

  format:
    desc: Formats and generates code via Dagger
    cmds:
      - dagger generate --auto-apply

  lint:
    desc: Runs all lint checks via Dagger
    cmds:
      - dagger check go:lint terrarium-ci:lint-prettier terrarium-ci:lint-actions terrarium-ci:lint-releaser

  lint:go:
    desc: Lints Go code via Dagger
    cmds:
      - dagger check go:lint

  lint:prettier:
    desc: Checks formatting of YAML, JSON, and Markdown via Dagger
    cmds:
      - dagger check terrarium-ci:lint-prettier

  lint:actions:
    desc: Lints GitHub Actions workflows via Dagger
    cmds:
      - dagger check terrarium-ci:lint-actions

  lint:releaser:
    desc: Validates GoReleaser configuration via Dagger
    cmds:
      - dagger check terrarium-ci:lint-releaser

  lint:deadcode:
    desc: Reports unreachable functions via Dagger
    cmds:
      - dagger call terrarium-ci lint-deadcode

  test:
    desc: Runs Go tests via Dagger
    cmds:
      - dagger check go:test-unit

  test:integration:
    desc: Runs CI module integration tests via Dagger
    cmds:
      - dagger check -m toolchains/terrarium/tests

  test:go:
    desc: Runs Go module integration tests via Dagger
    cmds:
      - dagger check -m toolchains/go/tests

  build:
    desc: Builds all binaries via Dagger
    cmds:
      - dagger call terrarium-ci build --output=./dist

  cover:
    desc: Runs Go tests with coverage via Dagger
    cmds:
      - dagger call go test-coverage --output=coverage.txt

  check:
    desc: Runs all checks via Dagger
    cmds:
      - dagger check

  scan:image:
    desc: Scans a container image for vulnerabilities via Dagger
    cmds:
      - dagger call security scan-image --target=...

  benchmark:
    desc: Measures pipeline stage timings via Dagger
    cmds:
      - dagger call terrarium-ci benchmark-summary

  benchmark:parallel:
    desc: Measures full-pipeline wall-clock time via Dagger (parallel)
    cmds:
      - dagger call terrarium-ci benchmark-summary --parallel

  release:
    desc: Runs full release via Dagger
    requires:
      vars: [GITHUB_TOKEN, TAG, REGISTRY_USERNAME, REGISTRY_PASSWORD]
    cmds:
      - >-
        dagger call terrarium-ci release
        --github-token=env://GITHUB_TOKEN
        --registry-username={{.REGISTRY_USERNAME}}
        --registry-password=env://REGISTRY_PASSWORD
        --tag={{.TAG}}
        --output=./dist

  lima:lock:
    desc: Updates the Lima flake lock file (run on the host)
    cmds:
      - nix flake update --flake {{.ROOT_DIR}}/lima

  lima:image:
    desc: Builds the golden qcow2 image (requires a Linux Nix builder)
    vars:
      NIX_SYSTEM:
        sh: "uname -m | sed 's/arm64/aarch64/' | sed 's/$/-linux/'"
    sources:
      - lima/flake.nix
      - lima/flake.lock
      - lima/configuration.nix
    generates:
      - lima/terrarium.qcow2
    cmds:
      - nix build {{.ROOT_DIR}}/lima#packages.{{.NIX_SYSTEM}}.image --no-update-lock-file --always-allow-substitutes --out-link {{.ROOT_DIR}}/lima/result
      - cp -f {{.ROOT_DIR}}/lima/result/*.qcow2 {{.ROOT_DIR}}/lima/terrarium.qcow2
      - rm -f {{.ROOT_DIR}}/lima/result

  lima:create:
    desc: Creates and starts the Terrarium Lima VM
    deps: [lima:image]
    vars:
      LIMA_IMAGE: "{{.ROOT_DIR}}/lima/terrarium.qcow2"
      LIMA_ARCH:
        sh: "uname -m | sed 's/arm64/aarch64/'"
    cmds:
      - >-
        limactl create --name=terrarium
        --set '.images = [{"location": "file://{{.LIMA_IMAGE}}", "arch": "{{.LIMA_ARCH}}"}]'
        lima/terrarium.yaml
      - limactl start terrarium

  lima:rebuild:
    desc: Rebuilds the Lima VM with the current NixOS configuration
    vars:
      ARCH:
        sh: limactl shell terrarium -- uname -m
    cmds:
      - limactl shell terrarium -- sudo rm -rf /tmp/lima-source
      - limactl shell terrarium -- sudo mkdir -p /tmp/lima-source
      - git archive HEAD | limactl shell terrarium -- sudo tar xf - -C /tmp/lima-source
      - git diff --name-only HEAD | tar cf - -T - | limactl shell terrarium -- sudo tar xf - -C /tmp/lima-source
      - git ls-files --others --exclude-standard | tar cf - -T - | limactl shell terrarium -- sudo tar xf - -C /tmp/lima-source
      - limactl shell terrarium -- sudo nixos-rebuild switch --no-update-lock-file --override-input source path:/tmp/lima-source --flake /tmp/lima-source/lima#terrarium-{{.ARCH}}

  lima:logs:
    desc: Tails provisioning logs from the Lima VM (run alongside lima:create)
    cmds:
      - |
        until limactl shell terrarium -- true 2>/dev/null; do sleep 2; done
        limactl shell terrarium -- journalctl -f -u lima-init --output=cat

  lima:test:
    desc: Runs Lima VM e2e tests
    cmds:
      - go run ./cmd/testrunner-lima --vm-name=terrarium

  lima:test:single:
    desc: Runs a single Lima VM e2e test by name
    cmds:
      - go run ./cmd/testrunner-lima --vm-name=terrarium --test={{.TEST}}

  lima:destroy:
    desc: Stops and deletes the Terrarium Lima VM
    cmds:
      - limactl stop terrarium || true
      - limactl delete terrarium

  install-hooks:
    desc: Install git hooks
    cmds:
      - lefthook install
