name: validate

on:
  push:
    branches:
      - "main"
  pull_request:

concurrency:
  group: validate-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

permissions:
  contents: read

jobs:
  check:
    name: check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Run all checks (test + lint in parallel)
        uses: dagger/dagger-for-github@v8.4.1
        with:
          version: "v0.21.4"
          verb: check
          args: test-unit lint lint-prettier lint-actions lint-releaser
          cloud-token: ${{ secrets.DAGGER_CLOUD_TOKEN }}
          enable-github-summary: "true"

      - name: Export coverage profile
        if: ${{ !cancelled() }}
        uses: dagger/dagger-for-github@v8.4.1
        with:
          version: "v0.21.4"
          call: go test-coverage --output=coverage.txt
          cloud-token: ${{ secrets.DAGGER_CLOUD_TOKEN }}
          enable-github-summary: "true"

      - name: Upload coverage reports to Codecov
        if: ${{ !cancelled() }}
        uses: codecov/codecov-action@v7
        with:
          token: ${{ secrets.CODECOV_TOKEN }}

  integration:
    name: integration
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Run terrarium integration tests
        uses: dagger/dagger-for-github@v8.4.1
        with:
          version: "v0.21.4"
          verb: check
          module: toolchains/terrarium/tests
          cloud-token: ${{ secrets.DAGGER_CLOUD_TOKEN }}
          enable-github-summary: "true"
