version: "3"

set: [errexit, nounset, pipefail]
shopt: [globstar]

# The .taskfiles/ segmentation is intentional, even where a namespace holds
# only thin Dagger wrappers — do not flatten it into this file.
includes:
  dagger: ./.taskfiles/dagger/Taskfile.yaml
  dev: ./.taskfiles/dev/Taskfile.yaml
  fmt: ./.taskfiles/fmt/Taskfile.yaml
  gh: ./.taskfiles/gh/Taskfile.yaml
  git: ./.taskfiles/git/Taskfile.yaml
  go: ./.taskfiles/go/Taskfile.yaml
  lima: ./.taskfiles/lima/Taskfile.yaml

tasks:
  default:
    cmd: task -l

  format:
    desc: Formats, tidies, and generates code via Dagger
    summary: |
      Runs every registered Dagger generator and applies the changes.
      Supersedes go:format, which remains for selective runs.
    cmds:
      - dagger generate --auto-apply

  lint:
    desc: Runs all lint targets
    deps: [go:lint, gh:lint, fmt:lint, releaser:lint]

  releaser:lint:
    desc: Validates the GoReleaser configuration via Dagger
    cmds:
      - dagger check terrarium-ci:lint-releaser

  test:
    desc: Runs all test targets
    deps: [go:test]

  build:
    desc: Builds all binaries via Dagger
    cmds:
      - dagger call terrarium-ci build --output=./dist

  check:
    desc: Runs all checks via Dagger
    cmds:
      - dagger check

  scan:
    desc: Scans source dependencies for vulnerabilities via Dagger
    cmds:
      - dagger call security scan-source

  pre-commit:
    desc: Runs all pre-commit targets
    cmds:
      - task: format
      - task: lint
      - task: test

  install:
    desc: Runs all install targets
    deps: [dev:install, git:hooks:install]

  clean:
    desc: Removes build artifacts and caches
    cmds:
      - rm -rf dist/ .test/ .task/ .tmp/

  release:
    desc: Runs full release via Dagger
    requires:
      vars: [GITHUB_TOKEN, TAG, REGISTRY_USERNAME, REGISTRY_PASSWORD]
    cmds:
      - >-
        dagger call terrarium-ci release
        --github-token=env://GITHUB_TOKEN
        --registry-username={{.REGISTRY_USERNAME}}
        --registry-password=env://REGISTRY_PASSWORD
        --tag={{.TAG}}
        --output=./dist
