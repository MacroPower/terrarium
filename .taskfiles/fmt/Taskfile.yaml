version: "3"

set: [errexit, nounset, pipefail]
shopt: [globstar]

tasks:
  # Unlike x, terrarium has no standalone prettier toolchain; prettier
  # writes happen through `task format` (dagger generate --auto-apply).
  lint:
    desc: Lints YAML, JSON, and Markdown files via Dagger
    cmds:
      - dagger check terrarium-ci:lint-prettier
